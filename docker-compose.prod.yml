version: "3.9"
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${BACKEND_URL}
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SEFARIA_BASE_URL=https://www.sefaria.org/api
      - FRONTEND_URL=${FRONTEND_URL}
      - ENVIRONMENT=production
    restart: unless-stopped
