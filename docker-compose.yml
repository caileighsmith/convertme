version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: convertme
      POSTGRES_PASSWORD: convertme
      POSTGRES_DB: convertme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convertme"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SEFARIA_BASE_URL=https://www.sefaria.org/api
      - FRONTEND_URL=http://localhost:3000
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://convertme:convertme@db:5432/convertme
      - JWT_SECRET_KEY=change-me-in-production
      - JWT_EXPIRE_MINUTES=10080
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
